name: defyx_vpn
description: "Defyx VPN - Secure, fast, and reliable VPN service providing global privacy protection with advanced encryption and multi-platform support"
publish_to: "none"
version: 5.3.9+267

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Backend Packages
  flutter_riverpod: ^3.3.1
  go_router: ^17.2.3
  shared_preferences: ^2.5.5
  dio: ^5.9.2
  dio_http_formatter: ^3.3.1
  shimmer: ^3.0.0
  shake: ^3.0.0
  vibration: ^3.1.8
  google_mobile_ads: ^8.0.0
  app_tracking_transparency: ^2.0.7
  url_launcher: ^6.3.2
  flame: ^1.37.0
  webview_flutter: ^4.13.1
  async: ^2.13.0
  flutter_secure_storage: ^10.3.1
  freezed_annotation: ^3.1.0
  retrofit: ^4.9.2
  json_annotation: ^4.12.0
  package_info_plus: ^9.0.1
  version: ^3.0.2
  flutter_timezone: ^5.1.0
  connectivity_plus: ^7.1.1

  # Frontend Packages
  flutter_screenutil: ^5.9.3
  flutter_svg: ^2.3.0
  lottie: ^3.3.3
  toastification: ^3.2.0
  path_drawing: ^1.0.1
  intl: ^0.20.2
  cupertino_icons: ^1.0.9
  flutter_dotenv: ^6.0.1
  firebase_core: ^4.9.0
  firebase_analytics: ^12.4.1
  firebase_crashlytics: ^5.2.2
  battery_plus: ^7.0.0
  audioplayers: ^6.7.0
  path_provider: ^2.1.5
  msix: ^3.16.13
  flutter_native_splash: ^2.4.7
  file_picker: ^11.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  retrofit_generator: ^10.2.6
  json_serializable: ^6.14.0
  freezed: ^3.2.5
  riverpod_generator: ^4.0.3

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/
    - assets/lottie/
    - assets/flags/
    - assets/sounds/
    - .env

  fonts:
    - family: Lato
      fonts:
        - asset: assets/fonts/Lato-Regular.ttf
        - asset: assets/fonts/Lato-Bold.ttf
          weight: 700
        - asset: assets/fonts/Lato-Light.ttf
          weight: 300
        - asset: assets/fonts/Lato-Thin.ttf
          weight: 100
        - asset: assets/fonts/Lato-Black.ttf
          weight: 900

flutter_native_splash:
  color: "#ffffff"
  image: assets/images/splash-light-logo.png
  color_dark: "#000000"
  image_dark: assets/images/splash-dark-logo.png

  android: true
  ios: true
  web: false

msix_config:
  display_name: Defyx VPN
  publisher_display_name: UnboundTech UG
  identity_name: UnboundTechUG.6065AEC5A207
  msix_version: 5.3.7.0
  publisher: "CN=62937938-2AE2-4C12-9ED8-4C418C0CADF2"
  logo_path: assets/images/logo.png
  capabilities: runFullTrust,internetClientServer,privateNetworkClientServer,unvirtualizedResources
  execution_alias: defyxvpn
  architecture: x64
  languages: en-us
  install_certificate: false
  enable_at_startup: false

